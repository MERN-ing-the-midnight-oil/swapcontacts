<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swap Outreach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --surface3: #2a2a2a;
  --border: #333;
  --border2: #444;
  --text: #e8e8e8;
  --text2: #999;
  --text3: #666;
  --accent: #c8f060;
  --accent2: #a8d040;
  --accent-dim: rgba(200,240,96,0.12);
  --accent-dim2: rgba(200,240,96,0.06);
  --red: #ff6b6b;
  --orange: #ffaa5e;
  --blue: #6ab0ff;
  --purple: #b09fff;
  --green: #6fefb0;
  --radius: 8px;
  --font-mono: 'DM Mono', monospace;
  --font-sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; }

/* ── LAYOUT ── */
.shell { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 56px 1fr; height: 100vh; overflow: hidden; }
.topbar { grid-column: 1/-1; display: flex; align-items: center; gap: 16px; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.topbar-logo { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: .04em; }
.topbar-logo span { color: var(--text2); font-weight: 300; }
.topbar-stats { display: flex; gap: 20px; margin-left: auto; }
.tstat { text-align: right; }
.tstat-val { font-family: var(--font-mono); font-size: 18px; font-weight: 500; line-height: 1; }
.tstat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }
.tstat-val.green { color: var(--accent); }
.tstat-val.blue { color: var(--blue); }
.tstat-val.orange { color: var(--orange); }
.import-btn { margin-left: 16px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); letter-spacing: .02em; transition: background .15s; white-space: nowrap; }
.import-btn:hover { background: var(--accent2); }

/* ── SIDEBAR ── */
.sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-section { padding: 14px 14px 8px; border-bottom: 1px solid var(--border); }
.sidebar-section-label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 8px; font-family: var(--font-mono); }
.filter-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 6px 10px; border-radius: 6px; border: none; background: transparent; color: var(--text2); font-size: 12px; font-family: var(--font-sans); cursor: pointer; transition: all .12s; text-align: left; }
.filter-btn:hover { background: var(--surface2); color: var(--text); }
.filter-btn.active { background: var(--accent-dim); color: var(--accent); }
.filter-btn .fcount { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
.filter-btn.active .fcount { color: var(--accent); }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 8px; display: inline-block; flex-shrink: 0; }
.contact-list { flex: 1; overflow-y: auto; padding: 8px; }
.contact-item { padding: 10px 10px; border-radius: var(--radius); cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; transition: all .12s; }
.contact-item:hover { background: var(--surface2); }
.contact-item.active { background: var(--accent-dim); border-color: rgba(200,240,96,.25); }
.ci-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-sub { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.search-wrap { padding: 10px; border-bottom: 1px solid var(--border); }
.search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 12px; font-family: var(--font-sans); outline: none; }
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--border2); }

/* ── MAIN PANEL ── */
.main { overflow-y: auto; display: flex; flex-direction: column; }

/* Empty state */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--text3); }
.empty-icon { font-size: 48px; opacity: .3; }
.empty-title { font-size: 16px; color: var(--text2); font-weight: 500; }
.empty-sub { font-size: 13px; text-align: center; max-width: 340px; line-height: 1.6; }
.upload-zone { border: 2px dashed var(--border2); border-radius: 12px; padding: 32px 48px; text-align: center; cursor: pointer; transition: all .2s; }
.upload-zone:hover { border-color: var(--accent); background: var(--accent-dim2); }
.upload-zone input { display: none; }
.upload-label { font-size: 13px; color: var(--text2); }
.upload-label strong { color: var(--accent); cursor: pointer; }

/* Contact detail */
.contact-detail { padding: 28px 32px; flex: 1; }
.cd-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
.cd-badge { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.cd-title { flex: 1; }
.cd-name { font-size: 22px; font-weight: 600; line-height: 1.2; }
.cd-meta { font-size: 13px; color: var(--text2); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
.cd-meta span { display: flex; align-items: center; gap: 4px; }
.next-btn { background: var(--accent); color: #000; border: none; border-radius: var(--radius); padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: background .15s; white-space: nowrap; }
.next-btn:hover { background: var(--accent2); }

/* Status row */
.status-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.status-chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s; font-family: var(--font-sans); }

/* Contact cards grid */
.contact-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 24px; }
.contact-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.cc-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-family: var(--font-mono); margin-bottom: 6px; }
.cc-value { font-size: 13px; word-break: break-all; }
.cc-value a { color: var(--accent); text-decoration: none; }
.cc-value a:hover { text-decoration: underline; }
.cc-empty { color: var(--text3); font-style: italic; font-size: 12px; }
.call-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #000; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; text-decoration: none; margin-top: 8px; transition: background .15s; }
.call-btn:hover { background: var(--accent2); }
.email-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface3); color: var(--text); border: 1px solid var(--border2); border-radius: 6px; padding: 6px 12px; font-size: 12px; text-decoration: none; margin-top: 8px; transition: all .15s; cursor: pointer; font-family: var(--font-sans); }
.email-btn:hover { border-color: var(--accent); color: var(--accent); }

/* AI Email section */
.ai-section { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; }
.ai-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.ai-label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); font-family: var(--font-mono); font-weight: 500; }
.api-key-row { display: flex; gap: 8px; margin-bottom: 12px; }
.api-key-input { flex: 1; background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 12px; font-family: var(--font-mono); outline: none; }
.api-key-input:focus { border-color: var(--border2); }
.api-key-input::placeholder { color: var(--text3); }
.gen-btn { background: var(--surface3); color: var(--accent); border: 1px solid rgba(200,240,96,.3); border-radius: 6px; padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: var(--font-sans); transition: all .15s; white-space: nowrap; }
.gen-btn:hover { background: var(--accent-dim); }
.gen-btn:disabled { opacity: .4; cursor: default; }
.email-textarea { width: 100%; background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: var(--text); font-size: 13px; font-family: var(--font-mono); font-weight: 300; line-height: 1.7; resize: vertical; min-height: 200px; outline: none; }
.email-textarea:focus { border-color: var(--border2); }
.email-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.copy-btn { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: background .15s; }
.copy-btn:hover { background: var(--accent2); }
.mailto-btn { background: var(--surface3); color: var(--text); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: var(--font-sans); transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; }
.mailto-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Notes */
.notes-section { margin-bottom: 20px; }
.notes-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-family: var(--font-mono); margin-bottom: 8px; }
.notes-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; color: var(--text); font-size: 13px; font-family: var(--font-sans); line-height: 1.6; resize: vertical; min-height: 80px; outline: none; }
.notes-textarea:focus { border-color: var(--border2); }
.notes-textarea::placeholder { color: var(--text3); }

/* Call log */
.log-section { margin-bottom: 24px; }
.log-entry { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.log-ts { font-family: var(--font-mono); color: var(--text3); font-size: 11px; white-space: nowrap; padding-top: 1px; }
.log-text { color: var(--text2); flex: 1; line-height: 1.5; }
.log-input-row { display: flex; gap: 8px; margin-top: 8px; }
.log-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 12px; font-family: var(--font-sans); outline: none; }
.log-input:focus { border-color: var(--border2); }
.log-add-btn { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-family: var(--font-sans); }
.log-add-btn:hover { color: var(--text); border-color: var(--border2); }

/* Pills / type badges */
.type-pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.type-bike { background: rgba(106,176,255,.15); color: var(--blue); border: 1px solid rgba(106,176,255,.25); }
.type-ski { background: rgba(176,159,255,.15); color: var(--purple); border: 1px solid rgba(176,159,255,.25); }
.type-gear { background: rgba(111,239,176,.15); color: var(--green); border: 1px solid rgba(111,239,176,.25); }
.type-sports { background: rgba(255,170,94,.15); color: var(--orange); border: 1px solid rgba(255,170,94,.25); }
.type-other { background: var(--surface3); color: var(--text3); border: 1px solid var(--border); }

/* Status colors */
.s-none { background: var(--surface3); color: var(--text3); border: 1px solid var(--border); }
.s-none.sel { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.s-emailed { background: rgba(106,176,255,.12); color: var(--blue); border: 1px solid rgba(106,176,255,.25); }
.s-emailed.sel { background: rgba(106,176,255,.25); border-color: var(--blue); }
.s-called-na { background: rgba(255,107,107,.12); color: var(--red); border: 1px solid rgba(255,107,107,.25); }
.s-called-na.sel { background: rgba(255,107,107,.25); border-color: var(--red); }
.s-voicemail { background: rgba(255,170,94,.12); color: var(--orange); border: 1px solid rgba(255,170,94,.25); }
.s-voicemail.sel { background: rgba(255,170,94,.25); border-color: var(--orange); }
.s-interested { background: rgba(200,240,96,.15); color: var(--accent); border: 1px solid rgba(200,240,96,.3); }
.s-interested.sel { background: rgba(200,240,96,.28); border-color: var(--accent); }
.s-not-interested { background: var(--surface3); color: var(--text3); border: 1px solid var(--border); }
.s-not-interested.sel { background: rgba(255,107,107,.15); color: var(--red); border-color: rgba(255,107,107,.4); }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="shell">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">swap<span>/</span>outreach</div>
    <div class="topbar-stats">
      <div class="tstat"><div class="tstat-val" id="s-total">—</div><div class="tstat-lbl">Total</div></div>
      <div class="tstat"><div class="tstat-val orange" id="s-pending">—</div><div class="tstat-lbl">Not contacted</div></div>
      <div class="tstat"><div class="tstat-val blue" id="s-inprog">—</div><div class="tstat-lbl">In progress</div></div>
      <div class="tstat"><div class="tstat-val green" id="s-interested">—</div><div class="tstat-lbl">Interested</div></div>
    </div>
    <button class="import-btn" style="background:var(--surface3);color:var(--text)" onclick="exportOutreach()">↓ Export progress</button>
    <label class="import-btn" style="background:var(--surface3);color:var(--text);margin-left:0" for="progress-upload">↑ Import progress</label>
    <input type="file" id="progress-upload" accept=".json" style="display:none">
    <label class="import-btn" for="csv-upload">↑ Import CSV</label>
    <input type="file" id="csv-upload" accept=".csv" style="display:none">
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="search-wrap">
      <input class="search-input" id="search-input" placeholder="Search contacts…" autocomplete="off">
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Filter by status</div>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">
        <span>All contacts</span><span class="fcount" id="fc-all">0</span>
      </button>
      <button class="filter-btn" data-filter="none" onclick="setFilter('none',this)">
        <span><span class="filter-dot" style="background:#555"></span>Not contacted</span>
        <span class="fcount" id="fc-none">0</span>
      </button>
      <button class="filter-btn" data-filter="emailed" onclick="setFilter('emailed',this)">
        <span><span class="filter-dot" style="background:var(--blue)"></span>Emailed</span>
        <span class="fcount" id="fc-emailed">0</span>
      </button>
      <button class="filter-btn" data-filter="called-na" onclick="setFilter('called-na',this)">
        <span><span class="filter-dot" style="background:var(--red)"></span>Called – no answer</span>
        <span class="fcount" id="fc-called-na">0</span>
      </button>
      <button class="filter-btn" data-filter="voicemail" onclick="setFilter('voicemail',this)">
        <span><span class="filter-dot" style="background:var(--orange)"></span>Left voicemail</span>
        <span class="fcount" id="fc-voicemail">0</span>
      </button>
      <button class="filter-btn" data-filter="interested" onclick="setFilter('interested',this)">
        <span><span class="filter-dot" style="background:var(--accent)"></span>Interested</span>
        <span class="fcount" id="fc-interested">0</span>
      </button>
      <button class="filter-btn" data-filter="not-interested" onclick="setFilter('not-interested',this)">
        <span><span class="filter-dot" style="background:#666"></span>Not interested</span>
        <span class="fcount" id="fc-not-interested">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Filter by type</div>
      <button class="filter-btn active-type" data-type="all" onclick="setTypeFilter('all',this)">
        <span>All types</span>
      </button>
      <button class="filter-btn" data-type="bike" onclick="setTypeFilter('bike',this)">
        <span><span class="filter-dot" style="background:var(--blue)"></span>Bike swaps</span>
        <span class="fcount" id="ft-bike">0</span>
      </button>
      <button class="filter-btn" data-type="ski" onclick="setTypeFilter('ski',this)">
        <span><span class="filter-dot" style="background:var(--purple)"></span>Ski swaps</span>
        <span class="fcount" id="ft-ski">0</span>
      </button>
      <button class="filter-btn" data-type="gear" onclick="setTypeFilter('gear',this)">
        <span><span class="filter-dot" style="background:var(--green)"></span>Gear swaps</span>
        <span class="fcount" id="ft-gear">0</span>
      </button>
      <button class="filter-btn" data-type="sports" onclick="setTypeFilter('sports',this)">
        <span><span class="filter-dot" style="background:var(--orange)"></span>Sports</span>
        <span class="fcount" id="ft-sports">0</span>
      </button>
    </div>

    <div class="contact-list" id="contact-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⇅</div>
      <div class="empty-title">Loading contacts…</div>
      <div class="empty-sub" id="empty-sub">Looks for <code style="color:var(--accent)">contacts.csv</code> next to this page. You can also import manually below.</div>
      <div class="upload-zone" onclick="document.getElementById('csv-upload').click()">
        <div class="upload-label"><strong>Choose contacts.csv</strong> or drag and drop</div>
      </div>
    </div>
    <div id="contact-detail" style="display:none"></div>
  </main>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let contacts = [];      // all loaded contacts
let outreach = {};      // {id: {status, notes, log:[], emailDraft}}  persisted in localStorage
let currentId = null;
let filterStatus = 'all';
let filterType = 'all';
let searchQ = '';
const STORAGE_KEY = 'swap_outreach_v1';
const KEY_KEY = 'swap_anthropic_key';
const CONTACTS_URL = 'contacts.csv';

// ── PERSISTENCE ────────────────────────────────────────────
function saveOutreach() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(outreach)); } catch(e) {}
}
function loadOutreach() {
  try { const d = localStorage.getItem(STORAGE_KEY); if(d) outreach = JSON.parse(d); } catch(e) {}
}
function getO(id) {
  if(!outreach[id]) outreach[id] = {status:'none', notes:'', log:[], emailDraft:''};
  return outreach[id];
}

// ── CSV PARSING ────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = parseCSVRow(lines[0]).map(h => h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
  const rows = [];
  for(let i = 1; i < lines.length; i++) {
    const vals = parseCSVRow(lines[i]);
    const obj = {};
    headers.forEach((h,j) => obj[h] = (vals[j]||'').trim());
    rows.push(obj);
  }
  return rows;
}
function parseCSVRow(line) {
  const cells = []; let cur = ''; let inQ = false;
  for(let i = 0; i < line.length; i++) {
    const c = line[i];
    if(c === '"') { if(inQ && line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(c === ',' && !inQ) { cells.push(cur); cur=''; }
    else cur += c;
  }
  cells.push(cur);
  return cells;
}
function normalizeContact(row) {
  const g = (...keys) => { for(const k of keys){ if(row[k] && row[k]!=='') return row[k]; } return ''; };
  const name = g('orgname','org_name','name','organization','event_name','event');
  const loc  = g('location','city','city__state');
  const type = g('type','event_type','swap_type') || 'other';
  const email = g('email','email_address');
  const phone = g('phone','phone_number','telephone');
  const facebook = g('facebook','facebook_url','fb');
  const website = g('website','website_url','url','web');
  const notes = g('notes','description','note');
  const sourceId = g('sourceid','source_id','id');
  const id = sourceId || btoa(unescape(encodeURIComponent((name+loc).toLowerCase()))).replace(/[^a-z0-9]/gi,'').slice(0,16) || ('id'+Math.random().toString(36).slice(2,10));
  return { id, name, loc, type: type.toLowerCase(), email, phone, facebook, website, sourceNotes: notes };
}

function loadContactsFromText(text) {
  const rows = parseCSV(text);
  contacts = rows.map(normalizeContact).filter(c => c.name);
  document.getElementById('empty-state').style.display = contacts.length ? 'none' : '';
  document.getElementById('contact-detail').style.display = contacts.length ? '' : 'none';
  renderAll();
  if(contacts.length && !currentId) selectContact(contacts[0].id);
  else if(currentId && contacts.find(c => c.id === currentId)) selectContact(currentId);
}

async function loadContactsFromUrl(url) {
  try {
    const res = await fetch(url);
    if(!res.ok) throw new Error('not found');
    loadContactsFromText(await res.text());
    const sub = document.getElementById('empty-sub');
    if(sub) sub.textContent = `Loaded ${contacts.length} contacts from ${url}. Progress is saved in this browser.`;
    return true;
  } catch {
    const empty = document.getElementById('empty-state');
    if(empty) {
      document.querySelector('.empty-title').textContent = 'Import your contacts.csv to begin';
    }
    return false;
  }
}

// ── IMPORT ─────────────────────────────────────────────────
document.getElementById('csv-upload').addEventListener('change', function(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadContactsFromText(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('progress-upload').addEventListener('change', function(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.outreach) outreach = { ...outreach, ...data.outreach };
      saveOutreach();
      renderAll();
      if(currentId) selectContact(currentId);
      alert('Outreach progress imported.');
    } catch(err) { alert('Invalid progress file: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Drag and drop on main
document.getElementById('main-panel').addEventListener('dragover', e => e.preventDefault());
document.getElementById('main-panel').addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => loadContactsFromText(ev.target.result);
  reader.readAsText(file);
});

// ── FILTERS ────────────────────────────────────────────────
function setFilter(f, el) {
  filterStatus = f;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function setTypeFilter(t, el) {
  filterType = t;
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
document.getElementById('search-input').addEventListener('input', function() {
  searchQ = this.value.toLowerCase();
  renderList();
});

function filteredContacts() {
  return contacts.filter(c => {
    const o = getO(c.id);
    if(filterStatus !== 'all' && o.status !== filterStatus) return false;
    if(filterType !== 'all' && c.type !== filterType) return false;
    if(searchQ && !c.name.toLowerCase().includes(searchQ) && !c.loc.toLowerCase().includes(searchQ)) return false;
    return true;
  });
}

// ── RENDER ─────────────────────────────────────────────────
const STATUS_INFO = {
  'none':         { label: 'Not contacted', color: '#555' },
  'emailed':      { label: 'Emailed',       color: 'var(--blue)' },
  'called-na':    { label: 'Called – no answer', color: 'var(--red)' },
  'voicemail':    { label: 'Left voicemail', color: 'var(--orange)' },
  'interested':   { label: 'Interested ✓',  color: 'var(--accent)' },
  'not-interested':{ label: 'Not interested', color: '#666' },
};
const TYPE_EMOJI = { bike:'🚲', ski:'⛷️', gear:'🎒', sports:'⚽', other:'🔄' };

function renderAll() {
  renderStats();
  renderList();
}

function renderStats() {
  const counts = { none:0, emailed:0, 'called-na':0, voicemail:0, interested:0, 'not-interested':0 };
  const typeCounts = { bike:0, ski:0, gear:0, sports:0 };
  contacts.forEach(c => {
    const s = getO(c.id).status || 'none';
    if(counts[s]!==undefined) counts[s]++;
    if(typeCounts[c.type]!==undefined) typeCounts[c.type]++;
  });
  document.getElementById('s-total').textContent = contacts.length;
  document.getElementById('s-pending').textContent = counts['none'];
  document.getElementById('s-inprog').textContent = counts['emailed'] + counts['called-na'] + counts['voicemail'];
  document.getElementById('s-interested').textContent = counts['interested'];
  document.getElementById('fc-all').textContent = contacts.length;
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('fc-'+k); if(el) el.textContent = counts[k];
  });
  Object.keys(typeCounts).forEach(k => {
    const el = document.getElementById('ft-'+k); if(el) el.textContent = typeCounts[k];
  });
}

function renderList() {
  const list = document.getElementById('contact-list');
  const filtered = filteredContacts();
  if(filtered.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">No contacts match</div>';
    return;
  }
  list.innerHTML = '';
  filtered.forEach(c => {
    const o = getO(c.id);
    const si = STATUS_INFO[o.status||'none'];
    const div = document.createElement('div');
    div.className = 'contact-item' + (c.id === currentId ? ' active' : '');
    div.id = 'ci-'+c.id;
    div.onclick = () => selectContact(c.id);
    div.innerHTML = `
      <div class="ci-name">${c.name}</div>
      <div class="ci-sub">
        <span class="status-dot" style="background:${si.color}"></span>
        <span>${c.loc||'Unknown location'}</span>
        <span>${TYPE_EMOJI[c.type]||''}</span>
      </div>`;
    list.appendChild(div);
  });
}

// ── CONTACT DETAIL ─────────────────────────────────────────
function selectContact(id) {
  currentId = id;
  document.querySelectorAll('.contact-item').forEach(el => el.classList.toggle('active', el.id === 'ci-'+id));
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  const o = getO(id);
  const panel = document.getElementById('contact-detail');
  panel.style.display = '';
  document.getElementById('empty-state').style.display = 'none';

  const typeClass = 'type-'+c.type;
  const statuses = [
    ['none','Not contacted','s-none'],
    ['emailed','Emailed','s-emailed'],
    ['called-na','Called – no answer','s-called-na'],
    ['voicemail','Left voicemail','s-voicemail'],
    ['interested','Interested ✓','s-interested'],
    ['not-interested','Not interested','s-not-interested'],
  ];

  const logHTML = (o.log||[]).map(e =>
    `<div class="log-entry"><span class="log-ts">${e.ts}</span><span class="log-text">${escHtml(e.text)}</span></div>`
  ).join('') || '<div style="color:var(--text3);font-size:12px;padding:4px 0">No activity logged yet</div>';

  const apiKey = localStorage.getItem(KEY_KEY) || '';

  // Find next uncontacted
  const idx = contacts.indexOf(c);
  const remaining = filteredContacts();
  const nextIdx = remaining.findIndex((x,i) => x.id !== id && i > remaining.indexOf(c));
  const nextContact = remaining.find(x => x.id !== id && getO(x.id).status === 'none');

  panel.innerHTML = `
    <div class="contact-detail">
      <div class="cd-header">
        <div class="cd-badge ${typeClass}" style="font-size:24px">${TYPE_EMOJI[c.type]||'🔄'}</div>
        <div class="cd-title">
          <div class="cd-name">${escHtml(c.name)}</div>
          <div class="cd-meta">
            <span>📍 ${escHtml(c.loc||'Unknown')}</span>
            <span class="type-pill ${typeClass}">${c.type} swap</span>
          </div>
        </div>
        ${nextContact ? `<button class="next-btn" onclick="selectContact('${nextContact.id}')">Next uncontacted →</button>` : ''}
      </div>

      <div class="status-row">
        ${statuses.map(([val,label,cls]) =>
          `<button class="status-chip ${cls} ${o.status===val?'sel':''}" onclick="setStatus('${id}','${val}')">${label}</button>`
        ).join('')}
      </div>

      <div class="contact-cards">
        <div class="contact-card">
          <div class="cc-label">Phone</div>
          ${c.phone
            ? `<div class="cc-value"><a href="tel:${c.phone.replace(/\s/g,'')}">${escHtml(c.phone)}</a></div>
               <a class="call-btn" href="tel:${c.phone.replace(/\s/g,'')}">📞 Call now</a>`
            : '<div class="cc-empty">Not found</div>'}
        </div>
        <div class="contact-card">
          <div class="cc-label">Email</div>
          ${c.email
            ? `<div class="cc-value"><a href="mailto:${c.email}">${escHtml(c.email)}</a></div>
               <a class="email-btn" href="mailto:${c.email}">✉ Open mail app</a>`
            : '<div class="cc-empty">Not found</div>'}
        </div>
        <div class="contact-card">
          <div class="cc-label">Facebook</div>
          ${c.facebook
            ? `<div class="cc-value"><a href="${c.facebook}" target="_blank">View page ↗</a></div>`
            : '<div class="cc-empty">Not found</div>'}
        </div>
        <div class="contact-card">
          <div class="cc-label">Website</div>
          ${c.website
            ? `<div class="cc-value"><a href="${c.website}" target="_blank">Visit site ↗</a></div>`
            : '<div class="cc-empty">Not found</div>'}
        </div>
      </div>

      ${c.sourceNotes ? `<div class="contact-card" style="margin-bottom:16px"><div class="cc-label">About this org</div><div class="cc-value" style="line-height:1.6;color:var(--text2)">${escHtml(c.sourceNotes)}</div></div>` : ''}

      <div class="ai-section">
        <div class="ai-section-header">
          <div class="ai-label">⚡ AI email draft</div>
        </div>
        <div class="api-key-row">
          <input class="api-key-input" id="api-key-input" type="password" placeholder="sk-ant-… (Anthropic API key, stored locally)" value="${escHtml(apiKey)}" oninput="localStorage.setItem('${KEY_KEY}',this.value)">
          <button class="gen-btn" id="gen-btn" onclick="generateEmail('${id}')">✦ Generate draft</button>
        </div>
        <textarea class="email-textarea" id="email-draft" placeholder="Click 'Generate draft' to write a personalized outreach email, or type your own…" oninput="saveEmailDraft('${id}',this.value)">${escHtml(o.emailDraft||'')}</textarea>
        <div class="email-actions">
          <button class="copy-btn" onclick="copyDraft()">Copy to clipboard</button>
          ${c.email ? `<a class="mailto-btn" id="mailto-link" href="mailto:${c.email}?subject=Gear%20Swap%20Management%20Tool&body=${encodeURIComponent(o.emailDraft||'')}">Open in mail app</a>` : ''}
        </div>
      </div>

      <div class="notes-section">
        <div class="notes-label">Notes</div>
        <textarea class="notes-textarea" placeholder="Call notes, follow-up reminders, anything…" oninput="saveNotes('${id}',this.value)">${escHtml(o.notes||'')}</textarea>
      </div>

      <div class="log-section">
        <div class="notes-label" style="margin-bottom:8px">Activity log</div>
        <div id="log-entries">${logHTML}</div>
        <div class="log-input-row">
          <input class="log-input" id="log-input" placeholder="Log a call, email, or note…" onkeydown="if(event.key==='Enter')addLog('${id}')">
          <button class="log-add-btn" onclick="addLog('${id}')">Add</button>
        </div>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ACTIONS ────────────────────────────────────────────────
function setStatus(id, status) {
  const o = getO(id);
  o.status = status;
  // Auto-log status changes
  const label = STATUS_INFO[status]?.label || status;
  o.log = o.log || [];
  o.log.push({ ts: fmtTs(), text: 'Status → ' + label });
  saveOutreach();
  selectContact(id);
  renderAll();
}

function saveNotes(id, val) {
  getO(id).notes = val;
  saveOutreach();
}

function saveEmailDraft(id, val) {
  getO(id).emailDraft = val;
  saveOutreach();
  // Update mailto link live
  const c = contacts.find(x => x.id === id);
  const ml = document.getElementById('mailto-link');
  if(ml && c?.email) ml.href = `mailto:${c.email}?subject=Gear%20Swap%20Management%20Tool&body=${encodeURIComponent(val)}`;
}

function addLog(id) {
  const input = document.getElementById('log-input');
  const text = (input?.value||'').trim();
  if(!text) return;
  const o = getO(id);
  o.log = o.log || [];
  o.log.push({ ts: fmtTs(), text });
  saveOutreach();
  input.value = '';
  const container = document.getElementById('log-entries');
  if(container) {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="log-ts">${fmtTs()}</span><span class="log-text">${escHtml(text)}</span>`;
    container.appendChild(div);
  }
}

function copyDraft() {
  const ta = document.getElementById('email-draft');
  if(!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.querySelector('.copy-btn');
    if(btn){ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy to clipboard',1500); }
  });
}

function fmtTs() {
  const d = new Date();
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
}

// ── AI EMAIL GENERATION ────────────────────────────────────
async function generateEmail(id) {
  const apiKey = document.getElementById('api-key-input')?.value?.trim();
  if(!apiKey) { alert('Enter your Anthropic API key above to generate emails.'); return; }
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  const btn = document.getElementById('gen-btn');
  const ta = document.getElementById('email-draft');
  if(btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Writing…'; }

  const prompt = `Write a short, friendly outreach email to a non-profit organization that runs a ${c.type} swap event.

Organization: ${c.name}
Location: ${c.loc}
Event type: ${c.type} swap

Context: I've built a free software tool called Gear Swap specifically for non-profits that run consignment swap events (bike swaps, ski swaps, gear swaps, etc.). It handles seller check-in, item labeling with QR codes, point-of-sale, and payout tracking. It's free for non-profits.

Write the email from my perspective as the developer reaching out. Keep it:
- Under 150 words
- Warm and personal, not salesy
- Reference their specific event type and location naturally
- Lead with genuine interest in what they do, not the product
- End with a simple, low-pressure ask (happy to show you a demo, or just answer questions)

Output just the email body (no subject line, no "Subject:", just the text starting with a greeting).`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-calls': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if(ta) ta.value = text;
    saveEmailDraft(id, text);
    localStorage.setItem(KEY_KEY, apiKey);
  } catch(err) {
    alert('Error generating email: ' + err.message);
  }
  if(btn) { btn.disabled = false; btn.innerHTML = '✦ Generate draft'; }
}

// ── NEXT UNCONTACTED ───────────────────────────────────────
function goNext() {
  const uncontacted = contacts.filter(c => getO(c.id).status === 'none');
  if(uncontacted.length > 0) selectContact(uncontacted[0].id);
}

function exportOutreach() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    contactCount: contacts.length,
    outreach
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'swap-outreach-progress.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── INIT ───────────────────────────────────────────────────
loadOutreach();
renderAll();
loadContactsFromUrl(CONTACTS_URL);
</script>
