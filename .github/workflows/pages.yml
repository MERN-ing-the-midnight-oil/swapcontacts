name: Publish outreach app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Sync site files into docs/
        run: |
          test -f contacts.csv || cp output/contacts.csv contacts.csv 2>/dev/null || true
          cp contacts.csv docs/contacts.csv
          cp index.html docs/index.html
          cp job-detail.html docs/job-detail.html
          npm ci
          npm run build
          node scripts/export-superjobs.js
          node scripts/generate-supabase-config.js
          # Guarantee a tiny config file so the app never 404s this request on Pages.
          test -f docs/supabase-config.js || echo 'window.SUPABASE_CONFIG = null;' > docs/supabase-config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v5
